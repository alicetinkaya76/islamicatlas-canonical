# Adapter registry — single source of truth for all enabled adapters.
# Read by pipelines/run_all_adapters.py, which orchestrates extract + canonicalize.
# Adding a new adapter: copy pipelines/adapters/_template/, edit manifest.yaml,
# and add a line below.

version: 0.1.0

adapters:
  # Phase 0 (Hafta 2): Bosworth pilot. Seeds the dynasty namespace.
  - adapter_id: bosworth
    enabled: true                 # Hafta 2 ETL pilot — 186 NIDs in one CSV-driven pass
    priority: 100
    config:
      strict_mode: true
      reconciliation_threshold: 0.85
      namespace: dynasty
      pipeline_name: canonicalize_dynasty

  # Phase 0 (Hafta 3): Yâqūt pilot. Seeds the place namespace (~12,954 entries).
  - adapter_id: yaqut
    enabled: true                 # Hafta 3 — Yâqūt al-Hamawī Muʿjam al-Buldān
    priority: 200
    config:
      strict_mode: true
      reconciliation_threshold: 0.85
      namespace: place
      pipeline_name: canonicalize_place_yaqut

  # Phase 0 (Hafta 3): Muqaddasī Aḥsan al-Taqāsīm. Adds 21 iqlims, 2049 places, 1427 routes.
  - adapter_id: muqaddasi
    enabled: true                 # Hafta 3 — al-Muqaddasī (d. 390/1000)
    priority: 205
    config:
      strict_mode: true
      reconciliation_threshold: 0.85
      namespace: place
      pipeline_name: canonicalize_place_muqaddasi
      depends_on: [yaqut]         # Muqaddasī xref resolves into existing Yâqūt PIDs

  # Phase 0 (Hafta 3): Le Strange. Augments places with administrative-region context.
  - adapter_id: le-strange
    enabled: true                 # Hafta 3 — Le Strange Lands of the Eastern Caliphate
    priority: 210
    config:
      strict_mode: true
      mode: merge_into_existing_places
      namespace: place
      pipeline_name: canonicalize_place_le_strange
      depends_on: [yaqut]

  # Phase 0 (Hafta 4): Science Layer migration. Seeds the person namespace from
  # 182 curated scholar entries with full trilingual names + dates + xref to alam/yaqut.
  - adapter_id: science-layer
    enabled: true
    priority: 300
    config:
      strict_mode: true
      reconciliation_threshold: 0.85
      namespace: person
      pipeline_name: canonicalize_person_science_layer

  # Phase 0 (Hafta 4): Bosworth rulers fix-up. Promotes inline rulers to person PIDs.
  - adapter_id: bosworth-rulers-fixup
    enabled: true
    priority: 305
    config:
      strict_mode: true
      reconciliation_threshold: 0.85
      namespace: person
      pipeline_name: canonicalize_person_from_bosworth_rulers
      depends_on: [bosworth]

  # Phase 0 (Hafta 4): DİA biographies. Primary mass-seed of person namespace.
  # ~7,300 distinct persons from 19,742 chunks across 8,093 slugs.
  - adapter_id: dia
    enabled: true
    priority: 310
    config:
      strict_mode: true
      reconciliation_threshold: 0.85
      namespace: person
      pipeline_name: canonicalize_person_dia
      depends_on: [science-layer, bosworth-rulers-fixup]

  # Phase 0 (Hafta 4): El-Aʿlām (Ziriklī). Two-track: augment DİA-known persons,
  # mint new for the rest (~12,500 net new).
  - adapter_id: el-alam
    enabled: true
    priority: 320
    config:
      strict_mode: true
      mode: two_track_augment_or_mint
      reconciliation_threshold: 0.85
      namespace: person
      pipeline_name: canonicalize_person_el_alam
      depends_on: [dia]

  # Phase 0.2: OpenITI work seed.
  - adapter_id: openiti
    enabled: false
    priority: 400
    config:
      namespace: work
      pipeline_name: canonicalize_work_openiti

# Reserved for future adapters (forward-declared for planning):
