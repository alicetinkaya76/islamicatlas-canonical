# Search projection rule for: person
# STATUS: forward-declared (P0.2 active). Schema mature; projection rules will mature with Bosworth rulers fix-up.

entity_type: person
projector_version: 0.1.0

mappings:
  id: $.["@id"]
  entity_type: "@const:person"
  subtypes: "@derived:subtypes_from_type_array"
  prefLabel_en: $.labels.prefLabel.en
  prefLabel_ar: $.labels.prefLabel.ar
  prefLabel_tr: $.labels.prefLabel.tr
  prefLabel_translit: "@derived:translit_ascii_fold(labels.prefLabel.ar-Latn-x-alalc, labels.prefLabel.en)"
  altLabels: "@derived:flatten_altLabels_plus_kunya_nisba_laqab"
  description_en: $.labels.description.en
  description_tr: $.labels.description.tr
  description_ar: $.labels.description.ar

  _geo: "@derived:person_geo(birth_place, death_place, active_in_places)"

  century_ce: "@derived:person_century_ce(birth_temporal, death_temporal, floruit_temporal)"
  century_ah: "@derived:person_century_ah(birth_temporal, death_temporal, floruit_temporal)"
  start_year_ce: "@derived:person_start_year(birth_temporal, floruit_temporal)"
  end_year_ce: "@derived:person_end_year(death_temporal, floruit_temporal)"

  iqlim: "@derived:iqlim_labels_via_places(birth_place, death_place, active_in_places)"
  source_layer: "@derived:source_layers_from_provenance(provenance.derived_from)"
  language: "@derived:languages_from_labels"

  has_coords: "@derived:bool_geo_resolved(birth_place, death_place, active_in_places)"
  has_wikidata: "@derived:bool_authority_present(authority_xref, 'wikidata')"
  wikidata_qid: "@derived:authority_id(authority_xref, 'wikidata')"

  person_profession: $.profession

  related_pids: "@derived:union(birth_place, death_place, active_in_places, affiliated_dynasties, authored_works, teachers, students)"
  related_labels: "@lookup:prefLabels(affiliated_dynasties + authored_works + active_in_places)"

  deprecated: "@derived:bool_default(provenance.deprecated, false)"
  modified_at: "@derived:unix_timestamp(provenance.modified)"
  _score: "@derived:score_person"

score_components:
  base: 1.0
  has_wikidata_bonus: 0.3
  has_coords_bonus: 0.2
  is_ruler_bonus: 0.4
  authored_works_count_log_bonus: 0.1
  has_viaf_bonus: 0.2
  manual_curation_bonus: 0.4
  deprecated_penalty: -100

unset_for_other_types:
  - person_profession
