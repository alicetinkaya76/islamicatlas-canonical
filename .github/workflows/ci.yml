name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-validate:
    name: Lint & Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy jsonschema

      - name: Ruff format check
        run: ruff format --check scripts/
        continue-on-error: true   # Week 1'de soft; Week 2'den itibaren strict

      - name: Ruff lint
        run: ruff check scripts/
        continue-on-error: true

      - name: Validate JSON Schema files are valid JSON Schema
        run: |
          python -c "
          import json, glob, sys
          from jsonschema import Draft7Validator
          failed = False
          for f in sorted(glob.glob('schema/canonical/*.schema.json')):
              try:
                  schema = json.load(open(f))
                  Draft7Validator.check_schema(schema)
                  print(f'✓ {f}')
              except Exception as e:
                  print(f'✗ {f}: {e}')
                  failed = True
          sys.exit(1 if failed else 0)
          "

  smoke-test-audit:
    name: Audit Script Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify audit script imports & argparse
        run: |
          python -c "import ast; ast.parse(open('scripts/week1_audit.py').read()); print('✓ syntax OK')"
          python scripts/week1_audit.py --help
